<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="448" y1="64" x2="64" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#0f172a"/>

  <!-- X mark — two bold diagonal strokes with rounded ends -->
  <!-- Stroke 1: top-left to bottom-right -->
  <path
    d="M 148 148 L 364 364"
    stroke="url(#g1)"
    stroke-width="72"
    stroke-linecap="round"
  />

  <!-- Stroke 2: top-right to bottom-left -->
  <path
    d="M 364 148 L 148 364"
    stroke="url(#g2)"
    stroke-width="72"
    stroke-linecap="round"
  />

  <!-- Center diamond highlight -->
  <circle cx="256" cy="256" r="18" fill="white" opacity="0.15"/>
</svg>

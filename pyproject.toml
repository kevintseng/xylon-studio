[tool.ruff]
line-length = 100
target-version = "py311"

exclude = [
    "agent/venv",
    ".git",
    "__pycache__",
    "node_modules",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults (FastAPI uses this)
]

[tool.ruff.lint.per-file-ignores]
"agent/tests/*" = ["E402"]  # module imports not at top — allow fixtures setup

[tool.pytest.ini_options]
# TestPlan/TestScenario are dataclasses in agent/pipeline/models.py, not test classes.
# Suppress the "cannot collect" warnings — they're dataclasses named "Test..." by domain convention.
filterwarnings = [
    "ignore::pytest.PytestCollectionWarning",
]
markers = [
    "integration: tests that require running Docker containers (Verilator/Yosys)",
    "slow: slow tests (> 5 seconds) — skipped by default",
]
# Skip integration tests by default; run with `pytest -m integration` to include them
addopts = "-m 'not integration'"
